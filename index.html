<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/frontend/index.html">
<title>Attestia — Loading</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #242424;
    --text: #fbfbfb;
    --muted: #b3b3b3;
    --green: #00c896;
    --mono: ui-monospace, 'SFMono-Regular', 'SF Mono', 'IBM Plex Mono', monospace;
    --sans: 'Sora', 'Avenir Next', 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top, rgba(0,200,150,0.12), transparent 40%), var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  main {
    width: min(92vw, 560px);
    padding: 32px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    box-shadow: 0 20px 80px rgba(0,0,0,0.35);
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.05;
  }
  p { margin: 0; color: var(--muted); line-height: 1.6; }
  a {
    color: var(--green);
    text-decoration: none;
  }
</style>
</head>
<body>
  <main>
    <div class="eyebrow">Attestia</div>
    <h1>Loading the live experience</h1>
    <p>If the redirect does not happen automatically, open <a href="/frontend/index.html">/frontend/index.html</a>.</p>
  </main>
</body>
</html>
