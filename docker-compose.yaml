version: '3.8'

services:
  # Props L3 — Pinned model sidecar (section 3.2)
  # Runs Llama 3.2 1B inside the enclave. Model hash is captured for attestation.
  ollama:
    image: ollama/ollama:latest
    platform: linux/amd64
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  props-oracle:
    image: vetskiver/props-oracle:s32
    platform: linux/amd64
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert_data:/app/certs  # Persist certificates across container restarts
    environment:
      - PORT=8080
      # S8/S10 — Pluggable Oracle: select data source
      # medical_board = real Chromium scrape of NYSED (default)
      # attorney      = real NY attorney registry via data.ny.gov API
      - ORACLE_TARGET=${ORACLE_TARGET:-medical_board}
      # Props L1: TLS fingerprints are HARDCODED in oracle.py (part of enclave measurement).
      # They are NOT configurable via env vars — changing the pin requires a code change,
      # which changes the enclave measurement, which is the correct trust model.
      # Set to "true" only for local dev — disables TLS pin and RSA decryption
      - SKIP_TLS_VERIFY=${SKIP_TLS_VERIFY:-false}
      - SKIP_ENCRYPTION=${SKIP_ENCRYPTION:-false}
      # Props L3: Ollama sidecar URL and model name
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:1b}
      - PINNED_MODEL_DIGEST=${PINNED_MODEL_DIGEST:-}
      - SKIP_MODEL_PIN=${SKIP_MODEL_PIN:-false}
      # Allow the API container to boot even if Ollama/model pull lags on first start.
      # Override with SKIP_OLLAMA_WAIT=false when you want strict startup blocking.
      - SKIP_OLLAMA_WAIT=${SKIP_OLLAMA_WAIT:-true}
      # Claim-alignment controls: fail closed when guarantees are required.
      - STRICT_MODE=${STRICT_MODE:-false}
      - REQUIRE_REAL_TEE=${REQUIRE_REAL_TEE:-false}
      - REQUIRE_LLM_EXTRACTION=${REQUIRE_LLM_EXTRACTION:-false}
      - REQUIRE_PINNED_MODEL=${REQUIRE_PINNED_MODEL:-false}
      - REQUIRE_ONCHAIN=${REQUIRE_ONCHAIN:-false}
      # Props L2 extension — on-chain certificate registry
      # Default: Base Sepolia (Coinbase L2, chain 84532)
      # To use Ethereum Sepolia instead, override CHAIN_* vars
      - CHAIN_RPC_URL=${CHAIN_RPC_URL:-https://sepolia.base.org}
      - CHAIN_ID=${CHAIN_ID:-84532}
      - CHAIN_NAME=${CHAIN_NAME:-Base Sepolia}
      - CHAIN_EXPLORER=${CHAIN_EXPLORER:-https://sepolia.basescan.org}
      # CONTRACT_ADDRESS: deployed PropsCertRegistry contract
      # PRIVATE_KEY: deployer key — set via .env or Phala Cloud secrets, never commit
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-0x07a7c1efc53923b202191a888fad41e54cae7ca6}
      - PRIVATE_KEY=${PRIVATE_KEY}
      # Optional: Intel Trust Authority API key for third-party remote appraisal.
      # Hardware trust works without this, but configuring it upgrades intel_details
      # from "unavailable/401" to a real Intel-backed appraisal result.
      - INTEL_TRUST_AUTHORITY_URL=${INTEL_TRUST_AUTHORITY_URL:-https://api.trustauthority.intel.com/appraisal/v2/attest}
      - INTEL_TRUST_AUTHORITY_API_KEY=${INTEL_TRUST_AUTHORITY_API_KEY}
    shm_size: '256m'
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  ollama_data:
  cert_data:
