version: '3.8'

services:
  # Props L3 — Pinned model sidecar (section 3.2)
  # Runs Llama 3.2 3B inside the enclave. Model hash is captured for attestation.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  props-oracle:
    image: vetskiver/props-oracle:s6
    ports:
      - "8080:8080"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      - PORT=8080
      # S8 — Pluggable Oracle: select data source
      # medical_board = real Chromium scrape of NYSED (default)
      # employment    = mock HR portal (demo: protocol works for any TLS source)
      - ORACLE_TARGET=${ORACLE_TARGET:-medical_board}
      # Props L1: pin the TLS fingerprint of the real NYSED registry (www.op.nysed.gov).
      # Verified: openssl s_client -connect www.op.nysed.gov:443 -servername www.op.nysed.gov
      - NYSED_TLS_FINGERPRINT=${NYSED_TLS_FINGERPRINT:-0D53B7BB43B892DC70D34143113D16EC7A3628714D0104F193100A792BBC68D8}
      # Set to "true" only for local dev — disables TLS pin and RSA decryption
      - SKIP_TLS_VERIFY=${SKIP_TLS_VERIFY:-false}
      - SKIP_ENCRYPTION=${SKIP_ENCRYPTION:-false}
      # Props L3: Ollama sidecar URL and model name
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      # Props L2 extension — on-chain certificate registry (Base Sepolia)
      # Fill CONTRACT_ADDRESS after running: forge create contracts/PropsCertRegistry.sol:PropsCertRegistry --rpc-url https://ethereum-sepolia-rpc.publicnode.com --private-key <KEY>
      - CONTRACT_ADDRESS=0xB2c9D43E4668d93EB8C4275210f9d28709f4639b
      - PRIVATE_KEY=0xe7556444376837df453b4c73d05ad3536fcd1eba6515f81af9a255cb0539d905
    shm_size: '256m'
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  ollama_data:
